<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Store Game</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="#" class="logo">
                <img src="./img/logo.svg" alt="logo" class="logo__img">
            </a>

            <h4 class="title-4">ТВОЯ ИГРОВАЯ СТАНЦИЯ</h4>
            <h1 class="title-1">Погрузись в мир современных игр</h1>
            <button class="btn header__btn">ВЫБРАТЬ ПРИСТАВКУ</button>

            <div class="header__line-text">О нас</div>
            <div class="header__img">
                <img src="./img/header-1.png" alt="img">
                <img src="./img/header-2.png" alt="img">
                <img src="./img/header-3.png" alt="img">
                <img src="./img/header-4.png" alt="img">
            </div>
        </div>

        <div class="gamers">
            <h3 class="title-3 title-3_green-light">TOP 3 PLAYERS</h3>
            <div class="gamer">
                <img src="img/gamer-1.png" alt="gamer-img" class="gamer__img">
                <div class="gamer__text">
                    <h3 class="title-3 title-3_white">Лиза Фролова</h3>
                    <p class="gamer__score">score 2953</p>
                </div>
            </div>

            <div class="gamer">
                <img src="img/gamer-2.png" alt="gamer-img" class="gamer__img">
                <div class="gamer__text">
                    <h3 class="title-3 title-3_white">Андрей Степанов</h3>
                    <p class="gamer__score">score 2453</p>
                </div>
            </div>

            <div class="gamer">
                <img src="img/gamer-3.png" alt="gamer-img" class="gamer__img">
                <div class="gamer__text">
                    <h3 class="title-3 title-3_white">Иван Савельев</h3>
                    <p class="gamer__score">score 2253</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
